# ============================================================
#  Docker Compose — chạy local toàn bộ microservices
#  Dùng:  docker-compose up --build
# ============================================================

version: "3.9"

services:
  # ── Eureka Discovery Server ──────────────────────────────
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - PORT=8761
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_INSTANCE_HOSTNAME=discovery-service
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - microservice-net

  # ── API Gateway ──────────────────────────────────────────
  api-gateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SERVER_PORT=8080
      - EUREKA_URL=http://discovery-service:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      # Đổi thành JWKS URI thật của bạn
      - JWT_JWK_SET_URI=https://your-auth-server/.well-known/jwks.json
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_DEFAULT=60
      - APP_VERSION=1.0.0
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - microservice-net

networks:
  microservice-net:
    driver: bridge
