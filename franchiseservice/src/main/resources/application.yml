spring:
  application:
    name: FranchiseService

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=2;encrypt=true;trustServerCertificate=true
    username: sa
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  main:
    allow-circular-references: true

  data:
    redis:
      host: localhost
      port: 6379

  profiles:
    active: dev

server:
  address: 0.0.0.0
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: https://microservice-6dyb.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    disable-swagger-default-url: true

jwt:
  public-key: |
    


  private-key: |
    


  access-token-exp-minutes: 15
  refresh-token-exp-days: 7

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name:}] [requestId:%X{requestId}] %logger - %msg%n"