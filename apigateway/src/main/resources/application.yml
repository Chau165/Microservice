server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  webflux:
    base-path: /

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Tạm bỏ default-filters CircuitBreaker để debug rõ lỗi thật của auth-service
      # Khi chạy ổn rồi hãy bật lại
      default-filters:
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback/unknown

      routes:
        - id: dummy-echo-service
          uri: lb://DUMMY-ECHO-SERVICE
          predicates:
            - Path=/api/internal/**
          filters:
            - RewritePath=/api/internal/(?<segment>.*), /internal/${segment}

        - id: csfc-auth-service
          uri: lb://CSFC-AUTH-SERVICE
          predicates:
            - Path=/api/auth-service/**
          filters:
            # Giữ nguyên như hiện tại.
            # Nếu AuthController của bạn thực tế là /api/auth/** thì phải đổi dòng này.
            - RewritePath=/api/auth-service/(?<segment>.*), /api/auth-service/${segment}

        - id: franchise-contract-service
          uri: lb://FRANCHISESERVICE
          predicates:
            - Path=/api/contracts/**
          filters:
            - RewritePath=/api/contracts/(?<segment>.*), /api/contracts/${segment}

        - id: engagement-service
          uri: lb://ENGAGEMENT-SERVICE
          predicates:
            - Path=/api/engagement-service/**
          filters:
            - RewritePath=/api/engagement-service/(?<segment>.*), /api/engagement-service/${segment}

        - id: warehouse-service
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/warehouse-service/**
          filters:
            - RewritePath=/api/warehouse-service/(?<segment>.*), /api/warehouse-service/${segment}

        - id: shift-service
          uri: lb://SHIFT-SERVICE
          predicates:
            - Path=/api/shift-service/**
          filters:
            - RewritePath=/api/shift-service/(?<segment>.*), /api/shift-service/${segment}

        - id: metadata-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/metadata/**
          filters:
            - RewritePath=/api/metadata/(?<segment>.*), /${segment}
            - name: CircuitBreaker
              args:
                name: metadataCircuitBreaker
                fallbackUri: forward:/fallback/METADATA-SERVICE

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:https://microservice-6dyb.onrender.com/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:${HOSTNAME:localhost}}
    # Render chỉ expose HTTPS port 443 ra ngoài
    secure-port: 443
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/info
    health-check-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/health
    home-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/
    instance-id: ${spring.application.name}:443

rate-limit:
  ip:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default-limit: ${RATE_LIMIT_DEFAULT:60}
    window-seconds: 60
    refresh-seconds: 15
    config-key: gateway.ip.rate_limit.per_minute

app:
  version: ${APP_VERSION:1.0.0}
  slow-request:
    threshold-ms: ${SLOW_REQUEST_THRESHOLD:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,gateway
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

    instances:
      defaultCircuitBreaker:
        baseConfig: default

      metadataCircuitBreaker:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeout-duration: 30s
      metadataCircuitBreaker:
        timeout-duration: 3s
        cancel-running-future: true

logging:
  level:
    com.group1.apigateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG
    reactor.netty.http.client: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name:}] [requestId:%X{requestId}] %logger - %msg%n"
