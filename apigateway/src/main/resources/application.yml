server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  # ── JWT / OAuth2 ──────────────────────────────────────────
  #security:
  #  oauth2:
  #    resourceserver:
  #      jwt:
  #        jwk-set-uri: ${JWT_JWK_SET_URI:https://your-auth-server/.well-known/jwks.json}

  # ── Spring Cloud Gateway routes ──────────────────────────
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters:
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback/unknown

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: metadata-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/metadata/**

# ── Eureka Client ──────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}

# ── Rate Limit ─────────────────────────────────────────────
rate-limit:
  ip:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default-limit: ${RATE_LIMIT_DEFAULT:60}
    window-seconds: 60
    refresh-seconds: 15
    config-key: gateway.ip.rate_limit.per_minute

# ── App info ───────────────────────────────────────────────
app:
  version: ${APP_VERSION:1.0.0}
  slow-request:
    threshold-ms: ${SLOW_REQUEST_THRESHOLD:2000}

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Resilience4j Circuit Breaker ───────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      defaultCircuitBreaker:
        baseConfig: default

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    com.group1.apigateway: INFO
    org.springframework.cloud.gateway: INFO
