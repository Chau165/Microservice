server:
  port: 8080
  error:
    whitelabel:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      metadataCircuitBreaker:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      metadataCircuitBreaker:
        timeout-duration: 3s
        cancel-running-future: true

spring:
  application:
    name: ApiGateway
  profiles:
    active: dev
  webflux:
    base-path: /
  cloud:
    gateway:
      routes:
        - id: internal-to-metadata
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/internal/**
          filters:
            - RewritePath=/api/internal/(?<segment>.*), /internal/${segment}

        - id: csfc-auth-service
          uri: lb://CSFC-AUTH-SERVICE
          predicates:
            - Path=/api/auth-service/**
          filters:
            - RewritePath=/api/auth-service/(?<segment>.*), /${segment}

        - id: franchise-contract-service
          uri: lb://FRANCHISESERVICE
          predicates:
            - Path=/api/contracts/**
          filters:
            - RewritePath=/api/contracts/(?<segment>.*), /api/contracts/${segment}

        - id: engagement-service
          uri: lb://ENGAGEMENT-SERVICE
          predicates:
            - Path=/api/engagement-service/**
          filters:
            - RewritePath=/api/engagement-service/(?<segment>.*), /api/engagement-service/${segment}

        - id: warehouse-service
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/warehouse-service/**
          filters:
            - RewritePath=/api/warehouse-service/(?<segment>.*), /api/warehouse-service/${segment}

        - id: shift-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/shift-service/**
          filters:
            - RewritePath=/api/shift-service/(?<segment>.*), /api/shift-service/${segment}

        - id: metadata-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/metadata/**
          filters:
            - RewritePath=/api/metadata/(?<segment>.*), /api/metadata/${segment}


        - id: franchise-service
          uri: lb://METADATA-SERVICE
          predicates:
            - Path=/api/franchise-service/**
          filters:
            - RewritePath=/api/franchise-service/(?<segment>.*), /api/franchise-service/${segment}

app:
  version: 1.0.0

security:
  jwt:
    secret: ${JWT_SECRET:V7Pz0c5ZmTz4IVBdBrgiapaNOSKpRDWtT8AsXm+C1mE=}

# --- CẤU HÌNH EUREKA CLIENT ---
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://microservice-59zl.onrender.com/eureka/


management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: always

rate-limit:
  ip:
    enabled: true
    config-key: gateway.ip.rate_limit.per_minute
    default-limit: 60
    window-seconds: 60
    refresh-seconds: 15

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name:}] [requestId:%X{requestId}] %logger - %msg%n"