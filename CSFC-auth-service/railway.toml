# ============================================================
# railway.toml — Railway deployment config for csfc-auth-service
# Docs: https://docs.railway.app/reference/config-as-code
#
# Deploy steps on Railway:
# 1. Create a new Project → "Deploy from GitHub repo"
# 2. Select the CSFC-auth-service folder (or mono-repo root)
# 3. Railway will detect this file automatically
# 4. Add environment variables in Railway dashboard (see .env.example)
#
# NOTE: Railway does NOT provide SQL Server.
#       Use an external SQL Server (Azure SQL, etc.) and set DB_URL.
# ============================================================

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""          # Defined inside Dockerfile ENTRYPOINT
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120   # seconds — đủ thời gian để Spring Boot + MySQL connect
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Railway sets PORT automatically — the app reads ${PORT:8081}
