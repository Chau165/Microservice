# Render and Railway inject PORT automatically
server:
  port: ${PORT:8081}

spring:
  application:
    name: csfc-auth-service

  datasource:
    # Railway MySQL — biến env được Railway inject tự động
    # MYSQLHOST     = ${{RAILWAY_PRIVATE_DOMAIN}}
    # MYSQLPORT     = 3306
    # MYSQLUSER     = root
    # MYSQLPASSWORD = ${{MYSQL_ROOT_PASSWORD}}
    # MYSQLDATABASE = ${{MYSQL_DATABASE}}
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:authentication_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:tuldse184668@fpt.edu.vn}
    password: ${MAIL_PASSWORD:fryzapjrxznpmkyc}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

eureka:
  client:
    service-url:
      # Set EUREKA_URL in Render/Railway environment variables
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH:true}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  # Set JWT_SECRET in Render/Railway environment variables — use a strong random base64 string
  secret: ${JWT_SECRET:V7Pz0c5ZmTz4IVBdBrgiapaNOSKpRDWtT8AsXm+C1mE=}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}   # 15 minutes (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days (ms)

# Expose actuator endpoints for Railway/Render healthcheck
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    defaults:
      enabled: true