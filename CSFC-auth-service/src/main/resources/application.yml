server:
  port: ${PORT:8080}

spring:
  application:
    name: csfc-auth-service

  datasource:
    # Railway MySQL (hardcode)
    url: jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: jkuIcnzTlPiQfVdyrqaXrBWAoTuXWdnr
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # QUAN TRỌNG: để app fail rõ nếu DB không lên được (đừng treo healthcheck kiểu mập mờ)
      initialization-fail-timeout: 30000
      connection-timeout: 60000
      connection-test-query: SELECT 1
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: tuldse184668@fpt.edu.vn
    password: fryzapjrxznpmkyc
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: https://microservice-6dyb.onrender.com/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

jwt:
  secret: V7Pz0c5ZmTz4IVBdBrgiapaNOSKpRDWtT8AsXm+C1mE=
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never
      # Bật probe để sau này nếu bạn đổi healthcheck qua readiness/liveness thì sẵn
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState

  health:
    defaults:
      enabled: true
    db:
      enabled: false
    discovery:
      enabled: false
    mail:
      enabled: false
