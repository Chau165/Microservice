server:
  address: 0.0.0.0
  port: ${PORT:8763}
  forward-headers-strategy: framework

spring:
  application:
    name: metadata-service

  data:
    redis:
      url: redis://default:ItRBEjljWMXDHICNFJdCxBTjGIHPmzMk@centerbeam.proxy.rlwy.net:25969

  cache:
    type: none

  datasource:
    url: jdbc:mysql://shinkansen.proxy.rlwy.net:39756/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:pNXyuMURcClGkORjMGPzkfZezcuwjhkj}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:https://microservice-59zl.onrender.com/eureka/}
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${SERVER_PORT:${PORT:8763}}

    secure-port-enabled: true
    non-secure-port-enabled: false
    secure-port: ${PORT:8763}

    home-page-url: https://${EUREKA_INSTANCE_HOSTNAME:localhost}/
    status-page-url: https://${EUREKA_INSTANCE_HOSTNAME:localhost}:${PORT:8763}/actuator/info
    health-check-url: https://${EUREKA_INSTANCE_HOSTNAME:localhost}:${PORT:8763}/actuator/health
    health-check-url-path: /actuator/health

metadata:
  key:
    pattern: "^[a-zA-Z_][a-zA-Z0-9_.]*$"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always