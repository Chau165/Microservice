# ==============================================================
# 1. Cấu hình Server
# ==============================================================
server:
  port: 8083
  servlet:
    context-path: /api/engagement-service

# ==============================================================
# 2. Cấu hình Spring
# ==============================================================
spring:
  application:
    name: engagement-service

  # --- Error Handling ---
  web:
    error:
      include-message: always

  # --- Database (MySQL) ---
  datasource:
    url: jdbc:mysql://localhost:3306/engagement_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  # --- Jackson (JSON Format) ---
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh

  # --- Spring Cloud (Feign & Discovery) ---
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: FULL
    # Đã sửa lại phần discovery bị lỗi cú pháp của bạn
    discovery:
      enabled: true

# ==============================================================
# 3. Cấu hình Eureka (Cập nhật từ ảnh)
# ==============================================================
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://microservice-6dyb.onrender.com/eureka
  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    non-secure-port: 80
    non-secure-port-enabled: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

# ==============================================================
# 4. Biến môi trường tự định nghĩa (Custom Config)
# ==============================================================
application:
  config:
    user-service-url: http://localhost:8081
    order-service-url: http://localhost:8082
    franchise-service-url: http://localhost:8080

# ==============================================================
# 5. Cấu hình Logging
# ==============================================================
logging:
  level:
    root: INFO
    com.yourcompany.engagement: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# ==============================================================
# 6. Cấu hình Swagger/OpenAPI
# ==============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
